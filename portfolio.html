---
layout: page
title: "Portfolio"
permalink: /portfolio/
---

<h1 style="text-align:center; margin: 2rem 0;">作品集 Portfolio</h1>

<div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">

  {% for project in site.portfolio %}
  <div style="border:1px solid #eaeaea; border-radius:12px; padding:1.5rem; box-shadow:0 4px 6px rgba(0,0,0,0.1); background:#fff;">
    <h2 style="margin-top:0; font-size:1.2rem;">
      <a href="{{ project.url }}" style="text-decoration:none; color:#007acc;">{{ project.title }}</a>
    </h2>
    <p>{{ project.description }}</p>
    {% if project.tech %}
      <p>
        <strong>技术栈:</strong> 
        {{ project.tech | join: ", " }}
      </p>
    {% endif %}
    {% if project.link %}
      <p><a href="{{ project.link }}" target="_blank" style="color:#e63946;">查看项目 →</a></p>
    {% endif %}
  </div>
  {% endfor %}

</div>
